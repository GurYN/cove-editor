name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    # CGo (tree-sitter) rules out cross-compilation: build natively per
    # OS/arch and attach every artifact to the release.
    strategy:
      matrix:
        include:
          - os: macos-14 # arm64
            target: darwin_arm64
          - os: macos-13 # amd64
            target: darwin_amd64
          - os: ubuntu-24.04
            target: linux_amd64
          - os: ubuntu-24.04-arm
            target: linux_arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          CGO_ENABLED=1 go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o cove ./cmd/cove
          ./cove --version
          tar -czf "cove_${GITHUB_REF_NAME}_${{ matrix.target }}.tar.gz" cove
      - uses: softprops/action-gh-release@v2
        with:
          files: cove_*.tar.gz
          generate_release_notes: true
