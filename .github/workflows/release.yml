name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    # CGo (tree-sitter) rules out cross-compilation: build natively per
    # OS/arch and attach every artifact to the release.
    strategy:
      matrix:
        include:
          - os: macos-14 # arm64
            target: darwin_arm64
          - os: macos-13 # amd64
            target: darwin_amd64
          - os: ubuntu-24.04
            target: linux_amd64
          - os: ubuntu-24.04-arm
            target: linux_arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          CGO_ENABLED=1 go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o cove ./cmd/cove
          ./cove --version
          tar -czf "cove_${GITHUB_REF_NAME}_${{ matrix.target }}.tar.gz" cove
      - uses: softprops/action-gh-release@v2
        with:
          files: cove_*.tar.gz
          generate_release_notes: true

  tap:
    # Bump url + sha256 in the tap formula (it builds from source, so that's
    # the whole diff). Gated on build so a broken release never ships to brew.
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Compute source tarball sha256
        id: sha
        run: |
          SHA=$(curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: GurYN/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
      - name: Bump formula
        run: |
          sed -i \
            -e "s|url \".*\"|url \"https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.sha256 }}\"|" \
            Formula/cove.rb
          if git diff --quiet; then echo "formula already current"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "cove ${GITHUB_REF_NAME}"
          git push
